name: Update Submodules

on:
  workflow_dispatch:
    inputs:
      xray_commit:
        description: 'Commit hash for AndroidLibXrayLite (leave blank if skip)'
        required: false
        type: string
      socks5_commit:
        description: 'Commit hash for hev-socks5-tunnel (leave blank if skip)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodules to specific commit
        run: |
          if [ -n "${{ inputs.xray_commit }}" ]; then
            echo "Checkout AndroidLibXrayLite to ${{ inputs.xray_commit }}..."
            cd AndroidLibXrayLite
            git fetch --all
            git checkout ${{ inputs.xray_commit }}
            cd ..
          fi
          
          if [ -n "${{ inputs.socks5_commit }}" ]; then
            echo "Checkout hev-socks5-tunnel to ${{ inputs.socks5_commit }}..."
            cd hev-socks5-tunnel
            git fetch --all
            git checkout ${{ inputs.socks5_commit }}
            cd ..
          fi

      - name: Commit & push if changed
        run: |
          git config user.name "HatsuneMikuUwU"
          git config user.email "HatsuneMikuUwU@users.noreply.github.com"
          git add AndroidLibXrayLite hev-socks5-tunnel
          git diff --staged --quiet || git commit -m "chore: update submodules to specific commit"
          git push
